<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="760" viewBox="0 0 680 760">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 1. CLIENT -->
  <rect x="215" y="30" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="48" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441" font-family="sans-serif">Client</text>
  <text x="340" y="63" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#888780" font-family="sans-serif">POST /transactions + Bearer + Idempotency-Key</text>

  <line x1="340" y1="74" x2="340" y2="94" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 2. JWT FILTER -->
  <rect x="215" y="100" width="250" height="44" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489" font-family="sans-serif">JWT Filter</text>
  <text x="340" y="134" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7" font-family="sans-serif">valida assinatura RSA · extrai subject</text>

  <!-- error 401 -->
  <line x1="465" y1="122" x2="552" y2="122" stroke="#D85A30" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-red)"/>
  <text x="508" y="115" text-anchor="middle" font-size="9" fill="#D85A30" font-family="sans-serif" font-style="italic">token inválido</text>
  <rect x="554" y="108" width="116" height="28" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="612" y="122" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#712B13" font-family="sans-serif">401 Unauthorized</text>

  <line x1="340" y1="144" x2="340" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 3. IDEMPOTENCY SERVICE -->
  <rect x="215" y="170" width="250" height="54" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="189" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041" font-family="sans-serif">IdempotencyService</text>
  <text x="340" y="205" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">Redis → PostgreSQL · cria chave PROCESSING</text>

  <!-- 201 cached (left) -->
  <line x1="215" y1="197" x2="132" y2="197" stroke="#1D9E75" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-green)"/>
  <text x="173" y="190" text-anchor="middle" font-size="9" fill="#1D9E75" font-family="sans-serif" font-style="italic">COMPLETED</text>
  <rect x="10" y="183" width="120" height="28" rx="6" fill="#C0DD97" stroke="#97C459" stroke-width="0.5"/>
  <text x="70" y="197" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#27500A" font-family="sans-serif">201 cached</text>

  <!-- error 409 (right) -->
  <line x1="465" y1="197" x2="552" y2="197" stroke="#D85A30" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-red)"/>
  <text x="508" y="190" text-anchor="middle" font-size="9" fill="#D85A30" font-family="sans-serif" font-style="italic">já em andamento</text>
  <rect x="554" y="183" width="116" height="28" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="612" y="197" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#712B13" font-family="sans-serif">409 Conflict</text>

  <line x1="340" y1="224" x2="340" y2="244" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 4. TRANSACTION SERVICE -->
  <rect x="215" y="250" width="250" height="54" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="269" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041" font-family="sans-serif">TransactionService</text>
  <text x="340" y="285" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">valida payer · payee · saldo · tipo</text>

  <!-- error 400/403/404 (right) -->
  <line x1="465" y1="277" x2="552" y2="277" stroke="#D85A30" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-red)"/>
  <text x="508" y="270" text-anchor="middle" font-size="9" fill="#D85A30" font-family="sans-serif" font-style="italic">validação falhou</text>
  <rect x="554" y="263" width="116" height="28" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="612" y="277" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#712B13" font-family="sans-serif">400 / 403 / 404</text>

  <line x1="340" y1="304" x2="340" y2="324" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 5. AUTHORIZATION SERVICE -->
  <rect x="215" y="330" width="250" height="54" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="340" y="349" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806" font-family="sans-serif">AuthorizationService</text>
  <text x="340" y="365" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#854F0B" font-family="sans-serif">Feign GET /v2/authorize · @CircuitBreaker</text>

  <!-- error 403 (right) -->
  <line x1="465" y1="357" x2="552" y2="357" stroke="#D85A30" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-red)"/>
  <text x="508" y="350" text-anchor="middle" font-size="9" fill="#D85A30" font-family="sans-serif" font-style="italic">não autorizado</text>
  <rect x="554" y="343" width="116" height="28" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5"/>
  <text x="612" y="357" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#712B13" font-family="sans-serif">403 Forbidden</text>

  <line x1="340" y1="384" x2="340" y2="404" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 6. WALLET SERVICE -->
  <rect x="215" y="410" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="428" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041" font-family="sans-serif">WalletService</text>
  <text x="340" y="444" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">withdraw(payer) · deposit(payee)</text>

  <line x1="340" y1="454" x2="340" y2="474" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 7. TRANSACTION REPOSITORY -->
  <rect x="215" y="480" width="250" height="44" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="340" y="498" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#27500A" font-family="sans-serif">TransactionRepository</text>
  <text x="340" y="514" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3B6D11" font-family="sans-serif">save(transaction, COMPLETED) · PostgreSQL</text>

  <line x1="340" y1="524" x2="340" y2="544" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 8. EVENT PUBLISHER -->
  <rect x="215" y="550" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="568" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#085041" font-family="sans-serif">ApplicationEventPublisher</text>
  <text x="340" y="584" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">TransactionCompletedEvent</text>

  <!-- async notification (right) -->
  <line x1="465" y1="572" x2="552" y2="572" stroke="#888780" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <text x="508" y="565" text-anchor="middle" font-size="9" fill="#888780" font-family="sans-serif" font-style="italic">async</text>
  <rect x="554" y="558" width="116" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="612" y="572" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#085041" font-family="sans-serif">NotificationService</text>

  <line x1="340" y1="594" x2="340" y2="614" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 9. IDEMPOTENCY SAVE -->
  <rect x="215" y="620" width="250" height="54" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="639" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#085041" font-family="sans-serif">IdempotencyService.save()</text>
  <text x="340" y="655" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">status=COMPLETED · response=JSON</text>

  <!-- persistência (left → PostgreSQL) -->
  <line x1="215" y1="647" x2="132" y2="647" stroke="#1D9E75" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-green)"/>
  <text x="173" y="640" text-anchor="middle" font-size="9" fill="#1D9E75" font-family="sans-serif" font-style="italic">persistência</text>
  <rect x="10" y="633" width="120" height="28" rx="6" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="70" y="647" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#27500A" font-family="sans-serif">PostgreSQL</text>

  <!-- cache (right → Redis) -->
  <line x1="465" y1="647" x2="552" y2="647" stroke="#1D9E75" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-green)"/>
  <text x="508" y="640" text-anchor="middle" font-size="9" fill="#1D9E75" font-family="sans-serif" font-style="italic">cache</text>
  <rect x="554" y="633" width="116" height="28" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="612" y="647" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#085041" font-family="sans-serif">Redis TTL 24h</text>

  <line x1="340" y1="674" x2="340" y2="694" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 10. RESPONSE -->
  <rect x="215" y="700" width="250" height="44" rx="8" fill="#C0DD97" stroke="#97C459" stroke-width="0.5"/>
  <text x="340" y="718" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A" font-family="sans-serif">201 Created</text>
  <text x="340" y="734" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3B6D11" font-family="sans-serif">TransactionResponseDTO</text>

</svg>
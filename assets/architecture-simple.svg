<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- CLIENT -->
  <rect x="170" y="20" width="340" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="36" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#444441" font-family="sans-serif">Client</text>
  <text x="340" y="51" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#888780" font-family="sans-serif">HTTP Request</text>

  <line x1="340" y1="60" x2="340" y2="76" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- SECURITY -->
  <rect x="170" y="78" width="340" height="48" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="340" y="97" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489" font-family="sans-serif">Security Layer</text>
  <text x="340" y="114" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7" font-family="sans-serif">JWT · RSA · Spring Security</text>

  <line x1="340" y1="126" x2="340" y2="140" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- CONTROLLER -->
  <rect x="170" y="142" width="340" height="48" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
  <text x="340" y="161" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489" font-family="sans-serif">Controller Layer</text>
  <text x="340" y="178" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7" font-family="sans-serif">Auth · User · Wallet · Transaction</text>

  <line x1="340" y1="190" x2="340" y2="204" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- SERVICE -->
  <rect x="170" y="206" width="340" height="48" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="340" y="225" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041" font-family="sans-serif">Service Layer</text>
  <text x="340" y="242" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">Regras de negócio · @Transactional · Eventos</text>

  <line x1="340" y1="254" x2="340" y2="268" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- REPOSITORY -->
  <rect x="170" y="270" width="340" height="48" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
  <text x="340" y="289" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C" font-family="sans-serif">Repository Layer</text>
  <text x="340" y="306" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#185FA5" font-family="sans-serif">Spring Data JPA</text>

  <line x1="340" y1="318" x2="340" y2="332" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- PERSISTENCE: PostgreSQL + Redis -->
  <rect x="178" y="334" width="148" height="44" rx="8" fill="#EAF3DE" stroke="#97C459" stroke-width="0.5"/>
  <text x="252" y="351" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#27500A" font-family="sans-serif">PostgreSQL 16</text>
  <text x="252" y="367" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3B6D11" font-family="sans-serif">Flyway · migrations</text>

  <rect x="334" y="334" width="148" height="44" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="408" y="351" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#085041" font-family="sans-serif">Redis</text>
  <text x="408" y="367" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0F6E56" font-family="sans-serif">Cache · TTL 24h</text>

  <!-- GLOBAL EXCEPTION HANDLER (right side) -->
  <rect x="530" y="136" width="136" height="124" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text x="598" y="180" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#712B13" font-family="sans-serif">Global</text>
  <text x="598" y="196" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#712B13" font-family="sans-serif">Exception</text>
  <text x="598" y="212" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#712B13" font-family="sans-serif">Handler</text>
  <text x="598" y="232" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#993C1D" font-family="sans-serif">@RestControllerAdvice</text>

  <!-- dashed lines from Controller and Service to GlobalExceptionHandler -->
  <line x1="510" y1="166" x2="528" y2="166" stroke="#D85A30" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-coral)"/>
  <line x1="510" y1="230" x2="528" y2="230" stroke="#D85A30" stroke-width="0.7" stroke-dasharray="3 3" marker-end="url(#arr-coral)"/>

</svg>
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/app_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: redis
      port: 6379

  cache:
    redis:
      time-to-live: 86400000 # 24h

# Spring Boot Actuator Setup
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true